name: Deploy API to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH & Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/projects/investment/dominion/api
            git fetch origin main
            git reset --hard origin/main
            bash /var/www/projects/investment/dominion/api/deploy.sh
